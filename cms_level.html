<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長照需要等級 CMS 1–8</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:    #F7F0E6;
    --latte:    #E8D5B7;
    --caramel:  #C9A87C;
    --mocha:    #8B6347;
    --espresso: #5C3D2E;
    --sage:     #9CAF88;
    --blush:    #D4A5A5;
    --sky:      #A8C4C8;
    --honey:    #D4B483;
    --warm-white: #FBF6EE;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 60px;
  }

  /* ── 紙質紋理背景 ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(201,168,124,.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(139,99,71,.08) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── 頁面標題 ── */
  .page-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .page-header .badge {
    display: inline-block;
    background: var(--caramel);
    color: var(--warm-white);
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: .15em;
    padding: 5px 18px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  .page-header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(26px, 5vw, 42px);
    color: var(--espresso);
    font-weight: 700;
    line-height: 1.25;
  }
  .page-header h1 span {
    color: var(--caramel);
  }
  .page-header p {
    margin-top: 10px;
    color: var(--mocha);
    font-size: 15px;
    font-weight: 300;
    letter-spacing: .05em;
  }
  .divider {
    display: flex; align-items: center; gap: 12px;
    max-width: 320px; margin: 18px auto 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--caramel), transparent);
  }
  .divider span { font-size: 18px; }

  /* ── 卡片格線 ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
    max-width: 1080px;
    margin: 0 auto;
  }

  /* ── 單張卡片 ── */
  .card {
    background: var(--warm-white);
    border-radius: 20px;
    padding: 28px 26px 26px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 2px 8px rgba(92,61,46,.06),
      0 8px 24px rgba(92,61,46,.05);
    transition: transform .3s ease, box-shadow .3s ease;
    animation: fadeUp .5s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow:
      0 4px 12px rgba(92,61,46,.1),
      0 16px 36px rgba(92,61,46,.09);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* staggered delay */
  .card:nth-child(1) { animation-delay: .05s; }
  .card:nth-child(2) { animation-delay: .12s; }
  .card:nth-child(3) { animation-delay: .19s; }
  .card:nth-child(4) { animation-delay: .26s; }
  .card:nth-child(5) { animation-delay: .33s; }
  .card:nth-child(6) { animation-delay: .40s; }
  .card:nth-child(7) { animation-delay: .47s; }
  .card:nth-child(8) { animation-delay: .54s; }

  /* 裝飾圓 */
  .card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    border-radius: 50%;
    opacity: .18;
  }

  /* 等級色系 */
  .lv1  { --c: #A8C4C8; }  /* 無失能 – 霧藍 */
  .lv2  { --c: #9CAF88; }  /* 輕度失能 – 鼠尾草綠 */
  .lv3  { --c: #B5C49A; }  /* 輕度 */
  .lv4  { --c: #C9A87C; }  /* 中度 – 焦糖 */
  .lv5  { --c: #C49A72; }
  .lv6  { --c: #B8856A; }
  .lv7  { --c: #C07070; }  /* 重度 – 玫瑰磚紅 */
  .lv8  { --c: #A85858; }

  .card::before { background: var(--c); }

  /* 等級標籤 */
  .level-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .level-num {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--c);
    color: #fff;
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(0,0,0,.12);
  }
  .level-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--espresso);
  }
  .level-sub {
    font-size: 12px;
    font-weight: 400;
    color: var(--mocha);
    display: block;
    letter-spacing: .04em;
  }

  /* 插圖區 */
  .illus {
    width: 100%;
    height: 120px;
    border-radius: 14px;
    background: color-mix(in srgb, var(--c) 18%, var(--latte));
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    font-size: 52px;
    position: relative;
    overflow: hidden;
  }
  .illus::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.3) 0%, transparent 60%);
    border-radius: 14px;
  }

  /* 描述文字 */
  .tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 12px;
  }
  .tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 500;
    background: color-mix(in srgb, var(--c) 22%, var(--cream));
    color: var(--espresso);
    letter-spacing: .03em;
  }

  .desc {
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--mocha);
  }

  /* 底部進度條 */
  .severity-bar {
    margin-top: 18px;
    height: 5px;
    border-radius: 4px;
    background: var(--latte);
    overflow: hidden;
  }
  .severity-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--c), color-mix(in srgb, var(--c) 60%, var(--espresso)));
    transition: width .8s ease;
  }

  /* ── 圖例 ── */
  .legend {
    max-width: 1080px;
    margin: 40px auto 0;
    display: flex; flex-wrap: wrap; gap: 12px 24px;
    justify-content: center;
    font-size: 13px;
    color: var(--mocha);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* ── 頁腳 ── */
  footer {
    text-align: center;
    margin-top: 52px;
    font-size: 12px;
    color: var(--caramel);
    letter-spacing: .06em;
  }
</style>
</head>
<body>

<header class="page-header">
  <div class="badge">台灣長照 2.0</div>
  <h1>長照需要等級<span>（CMS）</span></h1>
  <p>照顧管理評估量表 ‧ 第 1 級 至 第 8 級</p>
  <div class="divider"><span>🌿</span></div>
</header>

<main class="grid" id="cards"></main>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#A8C4C8"></div>無失能</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9CAF88"></div>輕度失能</div>
  <div class="legend-item"><div class="legend-dot" style="background:#C9A87C"></div>中度失能</div>
  <div class="legend-item"><div class="legend-dot" style="background:#C07070"></div>重度失能</div>
</div>

<footer>資料來源：衛生福利部長照服務網 ‧ 僅供參考，詳細評估請洽長照專員</footer>

<script>
const data = [
  {
    lv: 1, cls: 'lv1',
    title: '第 1 級', sub: '無失能',
    emoji: '🌱',
    tags: ['ADL 正常', 'IADL 正常', '生活自理'],
    desc: '日常生活活動（ADL）與工具性日常生活活動（IADL）幾乎完全獨立，不需要他人協助，生活可完全自理。',
    pct: 12
  },
  {
    lv: 2, cls: 'lv2',
    title: '第 2 級', sub: '輕度失能',
    emoji: '🌿',
    tags: ['ADL 基本正常', 'IADL 需協助', '認知輕微退化'],
    desc: 'ADL 基本正常，但 IADL 需要適時協助，可能伴隨輕度認知退化或輕度失智。',
    pct: 24
  },
  {
    lv: 3, cls: 'lv3',
    title: '第 3 級', sub: '輕度失能',
    emoji: '🍃',
    tags: ['ADL 微依賴', 'IADL 部分協助', '術後 / 中風'],
    desc: 'ADL 有輕微依賴，IADL 需部分協助，常見於術後患者或輕度中風後恢復期。',
    pct: 36
  },
  {
    lv: 4, cls: 'lv4',
    title: '第 4 級', sub: '中度失能',
    emoji: '🫖',
    tags: ['ADL 中度依賴', 'IADL 中度失能', '情緒問題'],
    desc: 'ADL 中度依賴，或 IADL 中度失能，可能伴隨輕度失智或情緒問題，需他人協助日常事務。',
    pct: 50
  },
  {
    lv: 5, cls: 'lv5',
    title: '第 5 級', sub: '中度失能',
    emoji: '🫶',
    tags: ['ADL 高度依賴', 'IADL 高度依賴', '認知 / 情緒障礙'],
    desc: 'ADL 與 IADL 高度依賴，部分活動需完全協助，認知或情緒障礙明顯，照護需求顯著增加。',
    pct: 62
  },
  {
    lv: 6, cls: 'lv6',
    title: '第 6 級', sub: '中度失能',
    emoji: '🤲',
    tags: ['ADL 完全協助', 'IADL 完全協助', '特殊照護需求'],
    desc: 'ADL 與 IADL 高度依賴，部分活動需完全協助，可能有特殊照護需求，認知及情緒障礙較重。',
    pct: 74
  },
  {
    lv: 7, cls: 'lv7',
    title: '第 7 級', sub: '重度失能',
    emoji: '🌸',
    tags: ['ADL 極度依賴', 'IADL 極度依賴', '吞嚥 / 壓瘡 / 疼痛'],
    desc: 'ADL 與 IADL 極度依賴，部分活動需完全協助，伴隨特殊照護需求，如吞嚥困難、壓瘡護理或疼痛管理。',
    pct: 87
  },
  {
    lv: 8, cls: 'lv8',
    title: '第 8 級', sub: '重度失能',
    emoji: '💐',
    tags: ['ADL 完全失能', 'IADL 完全失能', '全程照護'],
    desc: 'ADL 與 IADL 完全失能，需全程照護，可能有安寧照顧需求，認知與情緒障礙極重，照護強度最高。',
    pct: 100
  }
];

const container = document.getElementById('cards');

data.forEach(d => {
  const card = document.createElement('article');
  card.className = `card ${d.cls}`;
  card.innerHTML = `
    <div class="level-tag">
      <div class="level-num">${d.lv}</div>
      <div class="level-label">${d.title}<span class="level-sub">${d.sub}</span></div>
    </div>
    <div class="illus">${d.emoji}</div>
    <div class="tags">${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <p class="desc">${d.desc}</p>
    <div class="severity-bar">
      <div class="severity-fill" style="width:${d.pct}%"></div>
    </div>
  `;
  container.appendChild(card);
});
</script>
</body>
</html>
