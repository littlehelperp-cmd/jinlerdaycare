<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預約參觀｜今樂日照健康有限公司</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://www.google.com/recaptcha/api.js?render=6LdNK44sAAAAAMMcpFMvPJJLba3hIwEr61_pXDpx"></script>

<style>
:root {
  --sage: #6b8f71;
  --sage-dark: #3d5c42;
  --sage-light: #a8c5ab;
  --cream: #faf7f2;
  --warm-white: #fffef9;
  --gold: #c9a84c;
  --gold-light: #e8d5a3;
  --terracotta: #c4714a;
  --charcoal: #2a2a2a;
  --mist: #eef2ee;
  --text-body: #4a4a4a;
  --error: #c0392b;

  --fs-label:   0.82rem;
  --fs-input:   0.92rem;
  --fs-field-label: 0.84rem;
  --fs-radio:   0.88rem;
  --fs-small:   0.82rem;
  --fs-body:    0.9rem;
  --fs-btn:      1rem;
  --fs-section-title: 0.95rem;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background-color: var(--cream);
  color: var(--charcoal);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── CURSOR ─── */
.cursor { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s ease; mix-blend-mode: multiply; }
.cursor-ring { width: 36px; height: 36px; border: 1.5px solid var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: all 0.18s ease; opacity: 0.6; }

/* ─── NAV ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 1.2rem 6%;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 100;
  background: rgba(250, 247, 242, 0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(107,143,113,0.12);
}
.logo-wrap { display: flex; flex-direction: column; text-decoration: none; }
.logo-main { font-family: 'Noto Serif TC', serif; font-size: 1.05rem; font-weight: 700; color: var(--sage-dark); letter-spacing: 0.05em; }
.logo-sub { font-size: 0.65rem; color: var(--gold); letter-spacing: 0.08em; margin-top: 2px; font-weight: 500; }
.nav-back { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-body); text-decoration: none; transition: color 0.3s; }
.nav-back:hover { color: var(--sage-dark); }

/* ─── HERO ─── */
.page-hero { padding: 130px 6% 70px; background: linear-gradient(135deg, #e8ede9 0%, #f5f0e8 50%, #ede8e0 100%); position: relative; overflow: hidden; }
.page-hero-content { position: relative; z-index: 2; max-width: 640px; }
.page-label { font-size: 0.72rem; letter-spacing: 0.2em; color: var(--gold); font-weight: 600; margin-bottom: 1rem; }
.page-hero h1 { font-family: 'Playfair Display', 'Noto Serif TC', serif; font-size: clamp(2rem, 5vw, 3.6rem); line-height: 1.2; }
.page-hero h1 em { font-style: italic; color: var(--sage-dark); }

/* ─── FORM ─── */
.form-section { padding: 72px 6%; display: grid; grid-template-columns: 1fr 360px; gap: 56px; max-width: 1200px; margin: 0 auto; }
.form-card { background: white; border-radius: 20px; padding: 44px; box-shadow: 0 4px 40px rgba(0,0,0,0.06); }
.form-section-title { font-family: 'Noto Serif TC', serif; font-size: var(--fs-section-title); font-weight: 700; color: var(--sage-dark); margin-bottom: 1.4rem; margin-top: 2rem; border-bottom: 1px solid var(--mist); display: flex; align-items: center; gap: 10px; }
.form-section-title span { width: 26px; height: 26px; border-radius: 50%; background: var(--sage-dark); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: var(--fs-field-label); font-weight: 600; }
.required { color: var(--terracotta); }

.form-group input, .form-group select, .form-group textarea {
  padding: 11px 14px; border: 1.5px solid #e8e5e0; border-radius: 8px; font-size: var(--fs-input); outline: none; background: var(--cream);
}
.form-group input.error { border-color: var(--error); }
.field-error { font-size: 0.75rem; color: var(--error); display: none; }
.field-error.show { display: block; }

.time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.time-slot { padding: 10px 8px; text-align: center; border: 1.5px solid #e8e5e0; border-radius: 8px; font-size: var(--fs-radio); cursor: pointer; transition: all 0.2s; }
.time-slot.selected { border-color: var(--sage-dark); background: var(--sage-dark); color: white; }

/* ─── PRIVACY ─── */
.privacy-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 16px; font-size: var(--fs-small); line-height: 1.7; }
.privacy-checkbox { width: 18px; height: 18px; border: 1.5px solid #ccc; border-radius: 4px; cursor: pointer; flex-shrink: 0; margin-top: 2px; position: relative; }
.privacy-checkbox.checked { background: var(--sage-dark); border-color: var(--sage-dark); }
.privacy-checkbox.checked::after { content: '✓'; color: white; position: absolute; left: 3px; top: -2px; font-size: 12px; }
.privacy-checkbox.sensitive.checked { background: var(--terracotta); border-color: var(--terracotta); }

.btn-submit { width: 100%; padding: 15px; background: var(--sage-dark); color: white; border: none; border-radius: 8px; font-size: var(--fs-btn); font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 24px; }
.btn-submit:hover:not(:disabled) { background: var(--terracotta); transform: translateY(-2px); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ─── SUCCESS ─── */
.success-overlay { display: none; position: fixed; inset: 0; background: rgba(250,247,242,0.98); z-index: 200; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.success-overlay.show { display: flex; }

/* ─── SIDEBAR ─── */
.sidebar { display: flex; flex-direction: column; gap: 18px; }
.notice-card { background: var(--sage-dark); border-radius: 16px; padding: 24px; color: white; }
.info-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.05); }

@media (max-width: 960px) { .form-section { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="index.html" class="logo-wrap">
    <span class="logo-main">今樂日照健康有限公司</span>
    <span class="logo-sub">附設桃園市私立今樂社區長照機構</span>
  </a>
  <a href="index.html" class="nav-back"><span>返回首頁</span></a>
</nav>

<div class="page-hero">
  <div class="page-hero-content">
    <div class="page-label">Reservation</div>
    <h1>預約<br><em>參觀諮詢 / 協助申請</em></h1>
  </div>
</div>

<div class="form-section">
  <div class="form-card">
    <div class="form-section-title"><span>1</span>服務使用者資訊</div>
    <div class="form-row triple">
      <div class="form-group">
        <label>長輩姓名 <span class="required">*</span></label>
        <input type="text" id="elderName" placeholder="姓名">
        <span class="field-error" id="err-elderName">請輸入姓名</span>
      </div>
      <div class="form-group">
        <label>年齡 <span class="required">*</span></label>
        <input type="number" id="elderAge" placeholder="例：78">
        <span class="field-error" id="err-elderAge">請輸入有效年齡</span>
      </div>
      <div class="form-group">
        <label>性別 <span class="required">*</span></label>
        <select id="gender">
          <option value="">選擇</option>
          <option>男</option>
          <option>女</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>CMS 等級</label>
        <select id="ltcLevel">
          <option value="">尚未評估</option>
          <option>第 2 級</option><option>第 3 級</option><option>第 4 級</option>
          <option>第 5 級</option><option>第 6 級</option><option>第 7 級</option><option>第 8 級</option>
        </select>
      </div>
      <div class="form-group">
        <label>是否有使用長照服務</label>
        <select id="ltcService">
          <option value="">— 請選擇 —</option>
          <option>是</option><option>否</option>
        </select>
      </div>
    </div>

    <div class="form-section-title"><span>2</span>預約時間</div>
    <div class="form-row">
      <div class="form-group">
        <label>預約日期 <span class="required">*</span></label>
        <input type="date" id="visitDate">
      </div>
      <div class="form-group">
        <label>總參觀人數 <span class="required">*</span></label>
        <select id="visitCount">
          <option value="">請選擇</option>
          <option>1 人</option><option>2 人</option><option>3 人</option><option>4 人</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>預約時段 <span class="required">*</span></label>
      <div class="time-slots">
        <div class="time-slot" onclick="selectTime(this)">10:00 – 11:00</div>
        <div class="time-slot" onclick="selectTime(this)">14:00 – 15:00</div>
        <div class="time-slot" onclick="selectTime(this)">其他時間</div>
      </div>
    </div>

    <div class="form-section-title"><span>3</span>主要聯絡人</div>
    <div class="form-row">
      <div class="form-group">
        <label>聯絡人姓名 <span class="required">*</span></label>
        <input type="text" id="contactName" placeholder="姓名">
      </div>
      <div class="form-group">
        <label>聯繫電話 <span class="required">*</span></label>
        <input type="tel" id="contactPhone" placeholder="0912345678">
      </div>
    </div>

    <div class="form-section-title"><span>4</span>其他資訊</div>
    <div class="form-group">
      <label>悄悄話</label>
      <textarea id="notes" placeholder="其他需求..."></textarea>
    </div>

    <div class="privacy-row">
      <div class="privacy-checkbox" id="consentGeneral" onclick="toggleConsent('consentGeneral','general')"></div>
      <span>我已閱讀並同意<a href="privacy.html">個資政策</a></span>
    </div>
    <div class="privacy-row">
      <div class="privacy-checkbox sensitive" id="consentSensitive" onclick="toggleConsent('consentSensitive','sensitive')"></div>
      <span>同意蒐集健康特種個資</span>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitForm()">送出預約申請</button>
    <div id="rateLimitNotice" style="display:none; color:orange; font-size:12px; margin-top:10px;">請稍候再送出</div>
  </div>

  <div class="sidebar">
    <div class="notice-card"><h3>📋 預約須知</h3><p>請於 2 個工作天前預約。</p></div>
    <div class="info-card"><h3>📍 中心位置</h3><p>桃園市八德區介壽路二段252巷21號1樓</p></div>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <h2>🌿 預約已送出！</h2>
  <p>我們將於 1 個工作天內聯繫您。</p>
  <a href="index.html" style="color:var(--gold); text-decoration:none; font-weight:bold;">返回首頁</a>
</div>

<script>
// ─── 基礎 UI 邏輯 ───
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
  ring.style.left = e.clientX - 13 + 'px'; ring.style.top = e.clientY - 13 + 'px';
});

function selectTime(el) {
  document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

const consentState = { general: false, sensitive: false };
function toggleConsent(id, key) {
  consentState[key] = !consentState[key];
  document.getElementById(id).classList.toggle('checked');
}

// ─── 送出邏輯 ───
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_LuHif2F1NP_wHZ0ULM63nSKf_GKGydOqudnZyU1BECkz9VZr-6br5Tsf7T0Bx02xyw/exec'; // ⚠️ 請更換為部署後的 URL

function submitForm() {
  const btn = document.getElementById('submitBtn');
  
  // 1. 簡易檢查
  if (!consentState.general) { alert("請勾選同意政策"); return; }
  if (!document.querySelector('.time-slot.selected')) { alert("請選擇時段"); return; }

  btn.disabled = true;
  btn.textContent = '提交中...';

  // 2. 取得 reCAPTCHA Token (請替換為您的 Site Key)
  grecaptcha.ready(() => {
    grecaptcha.execute('6LdNK44sAAAAAMMcpFMvPJJLba3hIwEr61_pXDpx', { action: 'submit' }).then(token => {
      
      const payload = {
        elderName:    document.getElementById('elderName').value,
        elderAge:     document.getElementById('elderAge').value,
        gender:       document.getElementById('gender').value,
        ltcLevel:     document.getElementById('ltcLevel').value,
        ltcService:   document.getElementById('ltcService').value,
        visitDate:    document.getElementById('visitDate').value,
        visitTime:    document.querySelector('.time-slot.selected').textContent,
        visitCount:   document.getElementById('visitCount').value,
        contactName:  document.getElementById('contactName').value,
        contactPhone: document.getElementById('contactPhone').value,
        notes:        document.getElementById('notes').value,
        recaptchaToken: token
      };

      // 3. 發送至 GAS
      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // 必須使用 no-cors
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        document.getElementById('successOverlay').classList.add('show');
      })
      .catch(err => {
        alert('送出失敗，請檢查連線');
        btn.disabled = false;
        btn.textContent = '重新送出';
      });
    });
  });
}
</script>
</body>
</html>
